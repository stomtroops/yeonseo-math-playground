<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff7fb5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="수학놀이터" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>마이멜로디 감성 수학 놀이터</title>
  <style>
    :root {
      --pink-100: #ffe5f1;
      --pink-200: #ffc9df;
      --pink-300: #ffadd0;
      --pink-500: #ff7fb5;
      --pink-700: #d94885;
      --mint-200: #d8fff4;
      --white: #ffffff;
      --text: #4d3550;
      --ok: #2b8a6e;
      --bad: #d6336c;
      --shadow: 0 20px 35px rgba(217, 72, 133, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Baloo 2", "Arial Rounded MT Bold", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, #fff9cf 0 14%, transparent 15%),
        radial-gradient(circle at 82% 14%, #e3f5ff 0 12%, transparent 13%),
        radial-gradient(circle at 88% 82%, #fde2ff 0 11%, transparent 12%),
        linear-gradient(160deg, #ffe9f4 0%, #ffe0f0 45%, #fff4cf 100%);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--white);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      border: 3px solid #ffd0e6;
      position: relative;
      overflow: hidden;
    }

    .app::before,
    .app::after {
      content: "🎀";
      position: absolute;
      font-size: 1.7rem;
      opacity: 0.6;
    }

    .app::before {
      top: 8px;
      left: 14px;
    }

    .app::after {
      top: 8px;
      right: 14px;
    }

    h1 {
      margin: 6px 0 8px;
      text-align: center;
      font-size: clamp(1.5rem, 4.5vw, 2.2rem);
      color: var(--pink-700);
    }

    .subtitle {
      text-align: center;
      margin: 0 0 16px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
    }

    .btn:hover {
      filter: brightness(1.03);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.mode {
      background: var(--pink-100);
      color: var(--pink-700);
      border: 2px solid #ffc2dd;
    }

    .btn.mode.active {
      background: var(--pink-500);
      color: #fff;
      border-color: var(--pink-500);
    }

    .board {
      background: linear-gradient(180deg, #fff9fd 0%, #fff3fb 100%);
      border-radius: 24px;
      padding: 18px;
      text-align: center;
      border: 2px dashed #ffc2dd;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      font-weight: 800;
    }

    .chip {
      background: var(--mint-200);
      border-radius: 999px;
      padding: 6px 12px;
      border: 1px solid #b4f2e1;
    }

    .question {
      font-size: clamp(2rem, 9vw, 3.2rem);
      margin: 14px 0;
      color: #c2255c;
      text-shadow: 0 3px 0 #ffe2ef;
    }

    .answer-area {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input[type="number"] {
      width: 150px;
      font-size: 1.5rem;
      padding: 10px;
      border-radius: 16px;
      border: 2px solid #ffb6d6;
      text-align: center;
      color: var(--pink-700);
      font-weight: 800;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: var(--pink-500);
      box-shadow: 0 0 0 4px #ffd7ea;
    }

    .btn.check {
      background: var(--pink-500);
      color: #fff;
      min-width: 110px;
    }

    .btn.next {
      background: #ffb03a;
      color: #fff;
      min-width: 110px;
    }

    .message {
      min-height: 32px;
      font-size: 1.06rem;
      font-weight: 900;
    }

    .message.ok {
      color: var(--ok);
    }

    .message.bad {
      color: var(--bad);
    }

    .stars {
      font-size: 1.4rem;
      letter-spacing: 2px;
      margin-top: 8px;
    }

    .footer {
      margin: 14px 0 0;
      text-align: center;
      font-size: 0.93rem;
      font-weight: 700;
      color: #7b5f7f;
    }

    @media (max-width: 520px) {
      .app {
        padding: 16px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      input[type="number"] {
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🎀 마이멜로디 감성 수학 놀이터 🎀</h1>
    <p class="subtitle">덧셈/뺄셈 10문제! 별을 모아보자</p>

    <section class="controls">
      <button class="btn mode active" data-mode="add">➕ 덧셈</button>
      <button class="btn mode" data-mode="sub">➖ 뺄셈</button>
      <button class="btn mode" data-mode="mix">🎲 섞어서</button>
    </section>

    <section class="board">
      <div class="stats">
        <span class="chip" id="roundInfo">문제: 1 / 10</span>
        <span class="chip" id="scoreInfo">점수: 0</span>
        <span class="chip" id="streakInfo">연속 정답: 0</span>
      </div>

      <div class="question" id="question">3 + 2 = ?</div>

      <div class="answer-area">
        <input id="answer" type="number" inputmode="numeric" min="0" aria-label="정답 입력" />
        <button class="btn check" id="checkBtn">정답 확인</button>
        <button class="btn next" id="nextBtn">다음 문제</button>
      </div>

      <div class="message" id="message"></div>
      <div class="stars" id="stars">☆☆☆☆☆</div>
    </section>

    <p class="footer">연속 정답이 늘면 점수 보너스도 커져요!</p>
  </main>

  <script>
    const totalQuestions = 10;
    let mode = "add";
    let qIndex = 1;
    let score = 0;
    let streak = 0;
    let currentAnswer = 0;
    let locked = false;

    const roundInfo = document.getElementById("roundInfo");
    const scoreInfo = document.getElementById("scoreInfo");
    const streakInfo = document.getElementById("streakInfo");
    const questionEl = document.getElementById("question");
    const answerInput = document.getElementById("answer");
    const messageEl = document.getElementById("message");
    const starsEl = document.getElementById("stars");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const modeButtons = [...document.querySelectorAll(".btn.mode")];

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function chooseMode() {
      if (mode === "mix") return Math.random() < 0.5 ? "add" : "sub";
      return mode;
    }

    function makeQuestion() {
      const activeMode = chooseMode();
      let a = randInt(0, 20);
      let b = randInt(0, 20);

      if (activeMode === "sub" && b > a) {
        [a, b] = [b, a];
      }

      currentAnswer = activeMode === "add" ? a + b : a - b;
      questionEl.textContent = `${a} ${activeMode === "add" ? "+" : "-"} ${b} = ?`;
      answerInput.value = "";
      answerInput.focus();
      locked = false;
      messageEl.textContent = "";
      messageEl.className = "message";
    }

    function updateStats() {
      roundInfo.textContent = `문제: ${qIndex} / ${totalQuestions}`;
      scoreInfo.textContent = `점수: ${score}`;
      streakInfo.textContent = `연속 정답: ${streak}`;
      const starCount = Math.min(5, Math.floor(score / 20));
      starsEl.textContent = "★".repeat(starCount) + "☆".repeat(5 - starCount);
    }

    function finishRound() {
      const praise = score >= 80 ? "정말 최고야!" : score >= 50 ? "너무 잘했어!" : "좋았어! 다시 도전해보자!";
      questionEl.textContent = `🎉 ${praise} 최종 점수 ${score}점`;
      messageEl.textContent = "모드 버튼을 누르면 새 게임이 시작돼요.";
      messageEl.className = "message ok";
      locked = true;
    }

    function checkAnswer() {
      if (locked) return;
      const val = Number(answerInput.value);
      if (Number.isNaN(val)) {
        messageEl.textContent = "숫자를 입력해줘!";
        messageEl.className = "message bad";
        return;
      }

      if (val === currentAnswer) {
        streak += 1;
        const bonus = 10 + Math.min(10, streak);
        score += bonus;
        messageEl.textContent = `정답! 👏 (+${bonus}점)`;
        messageEl.className = "message ok";
      } else {
        streak = 0;
        messageEl.textContent = `조금 아쉬워! 정답은 ${currentAnswer} 야.`;
        messageEl.className = "message bad";
      }

      locked = true;
      updateStats();
    }

    function nextQuestion() {
      if (!locked) {
        messageEl.textContent = "먼저 정답 확인을 눌러줘!";
        messageEl.className = "message bad";
        return;
      }

      if (qIndex >= totalQuestions) {
        finishRound();
        return;
      }

      qIndex += 1;
      updateStats();
      makeQuestion();
    }

    function resetGame(newMode) {
      mode = newMode;
      qIndex = 1;
      score = 0;
      streak = 0;
      updateStats();
      makeQuestion();

      modeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
    }

    checkBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", nextQuestion);

    answerInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        if (locked) nextQuestion();
        else checkAnswer();
      }
    });

    modeButtons.forEach((btn) => {
      btn.addEventListener("click", () => resetGame(btn.dataset.mode));
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          // Service worker registration can fail on local file protocol.
        });
      });
    }

    resetGame("add");
  </script>
</body>
</html>
