<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff80ab" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="연서사고력" />
  <meta name="description" content="7살 연서를 위한 사고력 수학 연습 앱" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>연서의 7세 사고력 놀이터</title>
  <style>
    :root {
      --paper: #fff6fb;
      --ink: #5b3349;
      --muted: #b07f97;
      --line: #ffd4e6;
      --coral: #ff5d99;
      --coral-soft: #ffe1ee;
      --teal: #ff80ab;
      --teal-dark: #e0457e;
      --mint: #ffe3f1;
      --sun: #ffc94d;
      --sun-soft: #fff0cf;
      --sky: #c79cff;
      --sky-soft: #f2e9ff;
      --grape: #b388ff;
      --good: #2fa36b;
      --bad: #e23d6d;
      --shadow: 0 24px 54px rgba(224, 69, 126, 0.18);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 16px 16px, rgba(255, 128, 171, 0.16) 5px, transparent 6px),
        radial-gradient(circle at 16px 16px, rgba(199, 156, 255, 0.14) 5px, transparent 6px),
        linear-gradient(180deg, #fff0f7 0%, #fff6fb 46%, #f7eeff 100%);
      background-size: 44px 44px, 44px 44px, auto;
      background-position: 0 0, 22px 22px, 0 0;
      overscroll-behavior: none;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button:focus-visible {
      outline: 4px solid rgba(19, 184, 166, 0.28);
      outline-offset: 3px;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar,
    .mode-strip,
    .progress-strip,
    .practice-panel,
    .control-panel,
    .result-panel {
      background: rgba(255, 253, 248, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
    }

    .mode-strip {
      padding: 10px 12px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }

    .mode-strip .control-title {
      margin: 0;
      white-space: nowrap;
    }

    .mode-strip .mode-grid {
      grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(224, 69, 126, 0.22);
    }

    .eyebrow {
      margin: 0 0 2px;
      color: var(--teal-dark);
      font-size: 0.82rem;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .best-pill {
      min-width: 116px;
      min-height: 42px;
      padding: 8px 12px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--sun-soft);
      color: #705200;
      font-weight: 900;
      white-space: nowrap;
    }

    .progress-strip {
      padding: 8px 12px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .progress-track {
      height: 12px;
      overflow: hidden;
      border-radius: var(--radius);
      background: #e8eef1;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: var(--radius);
      background: linear-gradient(90deg, var(--teal), var(--sky), var(--sun));
      transition: width 220ms ease;
    }

    .workspace {
      display: block;
    }

    .practice-panel {
      min-height: 470px;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      min-height: 36px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      background: var(--sky-soft);
      color: #6b3fae;
      font-weight: 900;
    }

    .badge.streak {
      background: var(--mint);
      color: var(--teal-dark);
    }

    .question-zone {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(210px, 1fr);
      grid-template-areas:
        "question answer"
        "actions answer"
        "mascot answer"
        "hint answer"
        "message answer";
      align-content: center;
      align-items: stretch;
      gap: 14px;
      text-align: center;
    }

    .question {
      grid-area: question;
      min-height: 112px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff 0%, #fff3f9 100%);
      border: 2px solid #ffc9e0;
      color: #5b3349;
      font-size: 4.4rem;
      font-weight: 1000;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .question.word-problem {
      font-size: clamp(2rem, 5vw, 3.35rem);
      line-height: 1.18;
      word-break: keep-all;
    }

    .question.visual-question {
      min-height: 218px;
      padding: 12px;
      line-height: 1.1;
    }

    .domino-question {
      width: min(360px, 100%);
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .domino-card {
      width: min(300px, 100%);
      height: 94px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border: 8px solid #d86d31;
      border-radius: 8px;
      background: #d86d31;
      box-shadow: 0 8px 0 rgba(216, 109, 49, 0.2);
    }

    .domino-half {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      padding: 8px;
      background: #d86d31;
      border-right: 3px solid #b85627;
    }

    .domino-half:last-child {
      border-right: 0;
      background: #fff8f1;
    }

    .domino-half.is-blank {
      background: #fff8f1;
    }

    .domino-cell {
      display: grid;
      place-items: center;
    }

    .domino-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.16);
    }

    .domino-half:last-child .domino-dot {
      background: #7c675b;
    }

    .domino-prompt {
      color: var(--ink);
      font-size: 1.25rem;
      font-weight: 1000;
    }

    .domino-summary {
      width: min(300px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--line);
      font-size: 1.05rem;
      font-weight: 1000;
    }

    .domino-summary-head,
    .domino-summary-value {
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 5px 8px;
    }

    .domino-summary-head {
      background: var(--grape);
      color: #ffffff;
    }

    .domino-summary-value {
      background: #ffffff;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .domino-summary-value.is-target {
      background: var(--coral-soft);
      color: var(--coral);
    }

    .count-question {
      width: min(560px, 100%);
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .count-board {
      --count-dot-size: 32px;
      --count-dot-gap: 8px;
      width: min(520px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      border: 2px solid #9eb3c8;
      border-radius: 10px;
      background: #f7fbff;
    }

    .draw-wrap {
      width: min(520px, 100%);
      display: grid;
      gap: 6px;
      justify-items: end;
    }

    .draw-area {
      position: relative;
      width: 100%;
      touch-action: none;
    }

    .draw-area .count-board {
      width: 100%;
    }

    .draw-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      pointer-events: auto;
    }

    .draw-path {
      fill: none;
      stroke: rgba(255, 93, 153, 0.82);
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .draw-clear {
      min-height: 30px;
      padding: 0 12px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--coral);
      font: inherit;
      font-size: 0.86rem;
      font-weight: 1000;
      box-shadow: 0 3px 0 rgba(255, 107, 107, 0.16);
    }

    .draw-clear:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 rgba(255, 107, 107, 0.16);
    }

    .count-frame {
      display: grid;
      grid-template-columns: repeat(5, var(--count-dot-size));
      gap: var(--count-dot-gap);
      justify-content: center;
      padding: 8px;
      border: 2px solid rgba(158, 179, 200, 0.75);
      border-radius: 10px;
      background: #ffffff;
    }

    .count-slot {
      width: var(--count-dot-size);
      height: var(--count-dot-size);
      display: grid;
      place-items: center;
      border: 2px solid rgba(79, 121, 168, 0.22);
      border-radius: 50%;
      background: rgba(79, 121, 168, 0.06);
    }

    .count-dot {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #4f79a8;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.16);
    }

    .count-expression {
      min-width: 132px;
      padding: 9px 14px;
      border: 2px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      color: var(--ink);
      font-size: 1.65rem;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .bundle-summary {
      width: min(520px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--line);
      font-size: 1rem;
      font-weight: 1000;
    }

    .bundle-summary-head,
    .bundle-summary-value {
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 5px 8px;
    }

    .bundle-summary-head {
      background: #f1d6de;
      color: var(--ink);
    }

    .bundle-summary-value {
      background: #ffffff;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .bundle-summary-value.is-target {
      background: var(--coral-soft);
      color: var(--coral);
    }

    .answer-display {
      grid-area: answer;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius);
      border: 2px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .answer-display.has-value {
      color: var(--coral);
      border-color: var(--coral);
      background: var(--coral-soft);
    }

    .answer-label {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      line-height: 1.15;
    }

    .answer-body {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(64px, auto);
      gap: 10px;
    }

    .mascot-stage {
      grid-area: mascot;
      min-height: 116px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 8px 0 0;
    }

    .mascot-stage[hidden] {
      display: none;
    }

    .speech-bubble {
      position: relative;
      min-width: 118px;
      padding: 12px 16px;
      border: 3px solid var(--coral);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--coral);
      font-size: 1.45rem;
      font-weight: 1000;
      box-shadow: 0 8px 0 rgba(255, 107, 107, 0.18);
      animation: bubblePop 340ms ease both;
    }

    .mascot-stage.is-ready .speech-bubble {
      border-color: var(--teal);
      color: var(--teal-dark);
      box-shadow: 0 8px 0 rgba(19, 184, 166, 0.18);
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      right: -13px;
      top: 42%;
      width: 20px;
      height: 20px;
      border-right: 3px solid var(--coral);
      border-bottom: 3px solid var(--coral);
      background: #ffffff;
      transform: rotate(-45deg);
    }

    .mascot-stage.is-ready .speech-bubble::after {
      border-color: var(--teal);
    }

    .bunny-mascot {
      width: min(170px, 32vw);
      max-width: 170px;
      height: auto;
      overflow: visible;
    }

    .mascot-arm {
      transform-origin: 168px 150px;
    }

    .mascot-stage.is-cheering .bunny-mascot {
      animation: mascotBounce 520ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .mascot-stage.is-cheering .mascot-arm {
      animation: thumbWave 680ms ease-in-out 80ms both;
    }

    .hint-area {
      grid-area: hint;
      min-height: 118px;
      padding: 12px;
      border-radius: var(--radius);
      border: 2px dashed #acd7c8;
      background: #f8fffb;
    }

    .hint-area[hidden] {
      display: none;
    }

    .hint-title {
      margin-bottom: 10px;
      color: var(--teal-dark);
      font-size: 1rem;
      font-weight: 900;
    }

    .counter-row {
      display: flex;
      justify-content: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .counter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.11);
    }

    .counter.second {
      background: var(--sun);
    }

    .counter.removed {
      position: relative;
      background: #c8d3d9;
    }

    .counter.removed::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 13px;
      height: 3px;
      border-radius: 999px;
      background: var(--bad);
      transform: rotate(-28deg);
    }

    .hint-token {
      min-width: 42px;
      min-height: 38px;
      padding: 6px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      background: #ffffff;
      border: 2px solid var(--line);
      color: var(--ink);
      font-size: 1.15rem;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .hint-token.answer {
      border-color: var(--coral);
      background: var(--coral-soft);
      color: var(--coral);
    }

    .message {
      grid-area: message;
      min-height: 42px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 1.2rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .message.good {
      color: var(--good);
    }

    .message.bad {
      color: var(--bad);
    }

    @keyframes mascotBounce {
      0% {
        opacity: 0;
        transform: translateY(22px) scale(0.86);
      }

      65% {
        opacity: 1;
        transform: translateY(-8px) scale(1.04);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes thumbWave {
      0%,
      100% {
        transform: rotate(0deg);
      }

      42% {
        transform: rotate(-15deg);
      }

      68% {
        transform: rotate(8deg);
      }
    }

    @keyframes bubblePop {
      0% {
        opacity: 0;
        transform: scale(0.76);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .control-panel {
      position: fixed;
      top: 50%;
      right: max(14px, env(safe-area-inset-right));
      z-index: 30;
      width: min(360px, calc(100vw - 28px));
      max-height: calc(100dvh - 28px);
      overflow: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transform: translateY(-50%);
    }

    .control-panel[hidden],
    .settings-backdrop[hidden] {
      display: none;
    }

    .settings-tab {
      position: fixed;
      top: 50%;
      right: max(0px, env(safe-area-inset-right));
      z-index: 32;
      min-width: 58px;
      min-height: 58px;
      padding: 8px 10px;
      border: 2px solid var(--line);
      border-right: 0;
      border-radius: 999px 0 0 999px;
      background: #ffffff;
      color: var(--coral);
      font-weight: 1000;
      box-shadow: 0 10px 24px rgba(224, 69, 126, 0.2);
      transform: translateY(-50%);
    }

    .settings-tab[aria-expanded="true"] {
      background: var(--coral-soft);
      color: var(--teal-dark);
    }

    .settings-backdrop {
      position: fixed;
      inset: 0;
      z-index: 28;
      background: rgba(91, 51, 73, 0.18);
      backdrop-filter: blur(2px);
    }

    .control-title {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 900;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .segmented.mode-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .mode-strip .segmented.mode-grid {
      grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
    }

    .segment-button,
    .action-button,
    .choice-button,
    .submit-button {
      min-height: 48px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 1000;
      transition: transform 100ms ease, filter 100ms ease, box-shadow 100ms ease;
    }

    .segment-button {
      padding: 8px;
      background: #ffffff;
      border: 2px solid var(--line);
      color: var(--ink);
    }

    .segment-button[aria-pressed="true"] {
      border-color: var(--teal);
      background: var(--mint);
      color: var(--teal-dark);
      box-shadow: inset 0 0 0 2px rgba(255, 128, 171, 0.28);
    }

    .segment-button:active,
    .action-button:active,
    .choice-button:active,
    .submit-button:active {
      transform: scale(0.97);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--line);
    }

    .score-item {
      min-height: 54px;
      padding: 10px;
      display: grid;
      place-items: center;
      gap: 2px;
      background: #ffffff;
      text-align: center;
    }

    .score-item span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .score-item strong {
      color: var(--ink);
      font-size: 1.3rem;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .mission-card {
      padding: 10px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff 0%, #fff6fb 100%);
    }

    .mission-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--ink);
      font-weight: 1000;
    }

    .mission-head strong {
      color: var(--teal-dark);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .mission-list {
      display: grid;
      gap: 6px;
      margin-bottom: 9px;
    }

    .mission-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

<body>
  <main class="app">

    function readStoredState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveSettings() {
      pruneDailyRecords();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        best: state.best,
        mode: state.mode,
        level: state.level,
        daily: state.daily
      }));
    }

    function clearAutoAdvance() {
      if (!autoAdvanceTimer) return;
      window.clearTimeout(autoAdvanceTimer);
      autoAdvanceTimer = null;
    }

    function scheduleAutoAdvance() {
      clearAutoAdvance();
      autoAdvanceTimer = window.setTimeout(() => {
        autoAdvanceTimer = null;
        if (state.locked && !state.finished) nextQuestion();
      }, AUTO_ADVANCE_DELAY_MS);
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(items) {
      const nextItems = [...items];
      for (let i = nextItems.length - 1; i > 0; i -= 1) {
        const j = randInt(0, i);
        [nextItems[i], nextItems[j]] = [nextItems[j], nextItems[i]];
      }
      return nextItems;
    }

    function pick(items) {
      return items[randInt(0, items.length - 1)];
    }

    function makeAnswerChoices(answer, level, preferredChoices = []) {
      const choices = new Set([answer]);
      const maxChoice = Math.max(level.max, answer + 3, 10);
      const offsets = [-3, -2, -1, 1, 2, 3, 4, -4, 5, -5];

      preferredChoices.forEach((choice) => {
        if (Number.isInteger(choice) && choice >= 0) choices.add(choice);
      });

      offsets.forEach((offset) => {
        if (choices.size >= 4) return;
        const candidate = answer + offset;
        if (candidate >= 0 && candidate <= maxChoice) choices.add(candidate);
      });

      while (choices.size < 4) {
        choices.add(randInt(0, maxChoice));
      }

      const distractors = [...choices].filter((choice) => choice !== answer);
      return shuffle([answer, ...shuffle(distractors).slice(0, 3)]);
    }

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDateLabel(dateKey) {
      const [, month, day] = dateKey.split("-");
      return `${Number(month)}월 ${Number(day)}일`;
    }

    function makeDailyRecord() {
      return {
        solved: 0,
        correct: 0,
        stickers: 0
      };
    }

    function ensureTodayRecord() {
      state.todayKey = getTodayKey();
      if (!state.daily || typeof state.daily !== "object") state.daily = {};
      if (!state.daily[state.todayKey]) state.daily[state.todayKey] = makeDailyRecord();
      return state.daily[state.todayKey];
    }

    function pruneDailyRecords() {
      if (!state.daily || typeof state.daily !== "object") return;
      const keys = Object.keys(state.daily).sort().slice(-14);
      state.daily = keys.reduce((records, key) => {
        records[key] = state.daily[key];
        return records;
      }, {});
    }

    function recordProblemResult(isCorrect) {
      const record = ensureTodayRecord();
      record.solved += 1;
      if (isCorrect) {
        record.correct += 1;
        record.stickers += 1;
      }
      saveSettings();
    }

    function makeHint(title, tokens) {
      return { title, tokens };
    }

    function getCountingMax(level) {
      if (level.max <= 10) return 19;
      if (level.max <= 20) return 29;
      return 49;
    }

    function makeCountTotal(level) {
      const max = getCountingMax(level);
      let total = 0;
      do {
        total = randInt(11, max);
      } while (total % 10 === 0);
      return total;
    }

    function makeTensExpression(total) {
      const base = Math.floor(total / 10) * 10;
      return `${base} + ${total - base}`;
    }

    function makeExpressionChoices(answerTotal, level) {
      const max = getCountingMax(level);
      const totals = new Set([answerTotal]);

      while (totals.size < 4) {
        let candidate = 0;
        do {
          candidate = randInt(11, max);
        } while (candidate % 10 === 0);
        totals.add(candidate);
      }

      return shuffle([...totals].map(makeTensExpression));
    }

    function buildAddQuestion(level) {
      const a = randInt(0, level.max);
      let b = randInt(0, level.max - a);
      if (a === 0 && b === 0) b = 1;
      const answer = a + b;
      const useStory = a > 0 && b > 0 && Math.random() < 0.3;
      const item = pick(STORY_ITEMS);
      return {
        mode: "add",
        text: useStory ? `${item} ${a}개와 ${b}개, 모두?` : `${a} + ${b}`,
        answer,
        key: `add-${a}-${b}`,
        isWord: useStory,
        hint: makeHint(useStory ? `${item}을 모두 모아 세어 봐.` : "두 수를 함께 모아 세어 봐.", [a, "+", b, "=", BLANK_SYMBOL])
      };
    }

    function buildSubQuestion(level) {
      const a = randInt(1, level.max);
      const b = randInt(0, a);
      const answer = a - b;
      const useStory = b > 0 && Math.random() < 0.3;
      const item = pick(STORY_ITEMS);
      return {
        mode: "sub",
        text: useStory ? `${item} ${a}개 중 ${b}개를 쓰면?` : `${a} - ${b}`,
        answer,
        key: `sub-${a}-${b}`,
        isWord: useStory,
        hint: makeHint(`${a}에서 ${b}만큼 덜어내면 몇일까?`, [a, "-", b, "=", BLANK_SYMBOL])
      };
    }

    function buildComposeQuestion(level) {
      const total = randInt(level.min, level.max);
      const shown = randInt(1, total - 1);
      const answer = total - shown;
      return {
        mode: "compose",
        text: `${total} = ${shown} + ${BLANK_SYMBOL}`,
        answer,
        key: `compose-${total}-${shown}`,
        isWord: true,
        hint: makeHint(`${total}을 두 묶음으로 나누어 봐.`, [shown, "+", BLANK_SYMBOL, "=", total])
      };
    }

    function buildMissingQuestion(level) {
      const useAddition = Math.random() < 0.55;

      if (useAddition) {
        const a = randInt(1, level.max - 1);
        const answer = randInt(1, level.max - a);
        const total = a + answer;
        return {
          mode: "missing",
          text: `${a} + ${BLANK_SYMBOL} = ${total}`,
          answer,
          key: `missing-add-${a}-${total}`,
          isWord: false,
          hint: makeHint(`${a}에서 ${total}이 되려면 얼마나 더할까?`, [a, "+", BLANK_SYMBOL, "=", total])
        };
      }

      const total = randInt(level.min, level.max);
      const answer = randInt(1, total - 1);
      const result = total - answer;
      return {
        mode: "missing",
        text: `${total} - ${BLANK_SYMBOL} = ${result}`,
        answer,
        key: `missing-sub-${total}-${result}`,
        isWord: false,
        hint: makeHint(`${total}에서 몇을 빼면 ${result}이 될까?`, [total, "-", BLANK_SYMBOL, "=", result])
      };
    }

    function buildMakeTenQuestion(level) {
      const max = Math.min(level.max, 30);
      const type = max <= 10 ? 1 : randInt(1, 3);

      if (type === 1) {
        const shown = randInt(1, 9);
        const answer = 10 - shown;
        return {
          mode: "makeTen",
          text: `${shown} + ${BLANK_SYMBOL} = 10`,
          answer,
          key: `make-ten-${shown}`,
          isWord: false,
          preferredChoices: [shown, 10],
          hint: makeHint("10이 되도록 짝꿍 수를 찾아 봐.", [shown, "+", BLANK_SYMBOL, "=", 10])
        };
      }

      if (type === 2) {
        const a = randInt(6, 9);
        const toTen = 10 - a;
        const maxAddend = Math.min(9, max - a);
        const b = randInt(toTen + 1, maxAddend);
        const rest = b - toTen;
        const answer = a + b;
        return {
          mode: "makeTen",
          text: `${a} + ${b}`,
          answer,
          key: `make-ten-add-${a}-${b}`,
          isWord: false,
          preferredChoices: [10, a, b],
          hint: makeHint(`먼저 ${a}에서 10을 만들고 남은 수를 더해 봐.`, [a, "+", toTen, "+", rest, "=", BLANK_SYMBOL])
        };
      }

      const total = randInt(11, Math.min(max, 18));
      const ones = total - 10;
      const take = randInt(ones + 1, Math.min(9, total - 1));
      const rest = take - ones;
      const answer = total - take;
      return {
        mode: "makeTen",
        text: `${total} - ${take}`,
        answer,
        key: `make-ten-sub-${total}-${take}`,
        isWord: false,
        preferredChoices: [10, total, take],
        hint: makeHint(`먼저 10까지 내려가고 남은 수를 더 빼 봐.`, [total, "-", ones, "-", rest, "=", BLANK_SYMBOL])
      };
    }

    function buildBridgeQuestion(level) {
      const max = level.max <= 10 ? 12 : Math.min(level.max, 30);
      const type = randInt(1, 4);

      if (type === 1) {
        const a = randInt(10, max - 1);
        const b = randInt(1, Math.min(9, max - a));
        const answer = a + b;
        return {
          mode: "bridge",
          text: `${a} + ${b}`,
          answer,
          key: `bridge-add-${a}-${b}`,
          isWord: false,
          preferredChoices: [a, b],
          hint: makeHint("10이 들어 있는 수에 더해 봐.", [a, "+", b, "=", BLANK_SYMBOL])
        };
      }

      if (type === 2) {
        const a = randInt(10, max);
        const b = randInt(1, Math.min(9, a));
        const answer = a - b;
        return {
          mode: "bridge",
          text: `${a} - ${b}`,
          answer,
          key: `bridge-sub-${a}-${b}`,
          isWord: false,
          preferredChoices: [a, b],
          hint: makeHint("10이 들어 있는 수에서 덜어내 봐.", [a, "-", b, "=", BLANK_SYMBOL])
        };
      }

      if (type === 3) {
        const a = randInt(5, max - 1);
        const answer = randInt(1, max - a);
        const total = a + answer;
        return {
          mode: "bridge",
          text: `${a} + ${BLANK_SYMBOL} = ${total}`,
          answer,
          key: `bridge-missing-${a}-${total}`,
          isWord: false,
          preferredChoices: [a, total],
          hint: makeHint(`${a}에서 ${total}까지 얼마나 더 갈까?`, [a, "+", BLANK_SYMBOL, "=", total])
        };
      }

      const number = randInt(10, max - 1);
      const answer = number + 1;
      return {
        mode: "bridge",
        text: `${number} 다음 수`,
        answer,
        key: `bridge-next-${number}`,
        isWord: true,
        preferredChoices: [number],
        hint: makeHint("바로 다음에 오는 수를 골라 봐.", [number, "다음", BLANK_SYMBOL])
      };
    }

    function buildDiceQuestion() {
      const givenKind = Math.random() < 0.5 ? "합" : "차";
      let visible = 0;
      let hidden = 0;
      let sum = 0;
      let gap = 0;

      do {
        visible = randInt(1, 6);
        hidden = randInt(1, 6);
        while (hidden === visible) hidden = randInt(1, 6);
        sum = visible + hidden;
        gap = Math.abs(visible - hidden);
      } while (givenKind === "차" && visible - gap >= 1 && visible + gap <= 6);

      const targetKind = givenKind === "합" ? "차" : "합";
      const givenValue = givenKind === "합" ? sum : gap;
      const answer = targetKind === "합" ? sum : gap;

      return {
        mode: "dice",
        text: `빈칸의 ${targetKind}`,
        answer,
        key: `dice-${givenKind}-${visible}-${hidden}`,
        isWord: false,
        visual: { type: "domino", visible, hidden, givenKind, givenValue, targetKind },
        preferredChoices: [visible, hidden, givenValue],
        hint: makeHint(`보이는 점과 주어진 ${givenKind}을 보고 ${targetKind}를 찾아 봐.`, ["점", visible, givenKind, givenValue, targetKind, BLANK_SYMBOL])
      };
    }

    function buildMatchCountQuestion(level) {
      const total = makeCountTotal(level);
      const expression = makeTensExpression(total);
      const asksExpression = Math.random() < 0.55;

      return {
        mode: "matchCount",
        text: asksExpression ? "그림과 식 연결" : "식과 수 연결",
        answer: asksExpression ? expression : total,
        key: `match-count-${asksExpression ? "expr" : "total"}-${total}`,
        isWord: false,
        visual: { type: "countMatch", total, expression, target: asksExpression ? "expression" : "total" },
        choices: asksExpression ? makeExpressionChoices(total, level) : undefined,
        preferredChoices: asksExpression ? [] : [Math.floor(total / 10) * 10, total % 10],
        hint: makeHint("10개씩 묶어 식과 수를 연결해 봐.", [expression, "=", total])
      };
    }

    function buildBundleQuestion(level) {
      const total = makeCountTotal(level);
      const tens = Math.floor(total / 10);
      const ones = total % 10;
      const target = Math.random() < 0.5 ? "tens" : "ones";
      const targetLabel = target === "tens" ? "10개씩 묶음" : "낱개";

      return {
        mode: "bundle",
        text: targetLabel,
        answer: target === "tens" ? tens : ones,
        key: `bundle-${target}-${total}`,
        isWord: false,
        visual: { type: "bundle", total, tens, ones, target },
        preferredChoices: [tens, ones, total],
        hint: makeHint("10개씩 묶고 남은 낱개를 세어 봐.", [tens, "묶음", ones, "낱개"])
      };
    }

    function buildPatternQuestion(level) {
      const step = randInt(1, level.stepMax);
      const start = randInt(0, Math.max(0, level.max - (step * 4)));
      const n1 = start;
      const n2 = start + step;
      const n3 = start + (step * 2);
      const answer = start + (step * 3);
      return {
        mode: "pattern",
        text: `${n1}, ${n2}, ${n3}, ${BLANK_SYMBOL}`,
        answer,
        key: `pattern-${start}-${step}`,
        isWord: false,
        hint: makeHint(`${step}씩 커지는 규칙이야.`, [n1, n2, n3, BLANK_SYMBOL])
      };
    }

    function buildCompareQuestion(level) {
      const type = randInt(1, 3);
      let a = randInt(1, level.max);
      let b = randInt(1, level.max);
      while (a === b) b = randInt(1, level.max);

      const big = Math.max(a, b);
      const small = Math.min(a, b);

      if (type === 1) {
        return {
          mode: "compare",
          text: `두 수 ${a}, ${b} 중 큰 수는?`,
          answer: big,
          key: `compare-big-${a}-${b}`,
          isWord: true,
          preferredChoices: [a, b],
          hint: makeHint("두 수를 보고 더 큰 쪽을 골라 봐.", [a, b])
        };
      }

      if (type === 2) {
        return {
          mode: "compare",
          text: `두 수 ${a}, ${b} 중 작은 수는?`,
          answer: small,
          key: `compare-small-${a}-${b}`,
          isWord: true,
          preferredChoices: [a, b],
          hint: makeHint("두 수를 보고 더 작은 쪽을 골라 봐.", [a, b])
        };
      }

      return {
        mode: "compare",
        text: `두 수 ${big}, ${small}의 차이는?`,
        answer: big - small,
        key: `compare-gap-${big}-${small}`,
        isWord: true,
        preferredChoices: [big, small],
        hint: makeHint("큰 수에서 작은 수까지의 차이를 생각해 봐.", [big, "-", small, "=", BLANK_SYMBOL])
      };
    }

    function buildQuestion(level) {
      const builders = {
        add: buildAddQuestion,
        sub: buildSubQuestion,
        compose: buildComposeQuestion,
        missing: buildMissingQuestion,
        makeTen: buildMakeTenQuestion,
        bridge: buildBridgeQuestion,
        dice: buildDiceQuestion,
        matchCount: buildMatchCountQuestion,
        bundle: buildBundleQuestion,
        pattern: buildPatternQuestion,
        compare: buildCompareQuestion
      };

      return builders[state.mode](level);
    }

    function makeQuestion() {
      const level = LEVELS[state.level];
      let nextQuestion = null;

      for (let i = 0; i < 8; i += 1) {
        nextQuestion = buildQuestion(level);
        if (nextQuestion.key !== state.lastQuestionKey) break;
      }

      state.current = nextQuestion;
      state.current.choices = nextQuestion.choices
        ? shuffle(nextQuestion.choices)
        : makeAnswerChoices(nextQuestion.answer, level, nextQuestion.preferredChoices);
      state.lastQuestionKey = nextQuestion.key;
      state.answerText = "";
      state.attempts = 0;
      state.locked = false;
      state.finished = false;
      state.hintOpen = false;
      state.mascotCheering = false;
      state.message = "연서야, 같이 풀자!";
      state.messageType = "";
      render();
    }

    function resetGame(nextMode = state.mode, nextLevel = state.level) {
      clearAutoAdvance();
      state.mode = nextMode;
      state.level = nextLevel;
      state.questionNumber = 1;
      state.score = 0;
      state.correct = 0;
      state.streak = 0;
      state.finished = false;
      state.lastQuestionKey = "";
      els.resultPanel.hidden = true;
      saveSettings();
      makeQuestion();
    }

    function getStarCount() {
      if (state.correct >= 9) return 3;
      if (state.correct >= 7) return 2;
      if (state.correct >= 4) return 1;
      return 0;
    }

    function selectChoice(choice) {
      if (state.locked || state.finished) return;
      state.answerText = String(choice);
      state.message = "좋아. 입력을 눌러 확인해줘.";
      state.messageType = "";
      state.mascotCheering = false;
      render();
    }

    function playTone(kind) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      try {
        const context = new AudioContext();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.connect(gain);
        gain.connect(context.destination);

        oscillator.type = "sine";
        oscillator.frequency.value = kind === "good" ? 660 : 240;
        gain.gain.setValueAtTime(0.001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.12, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.18);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.2);
      } catch {
        // Some browsers block audio until they decide a tap is user activation.
      }
    }

    function checkAnswer() {
      if (state.locked || state.finished) return;
      if (!state.answerText) {
        state.message = "답을 먼저 고르고 입력을 눌러줘.";
        state.messageType = "bad";
        render();
        return;
      }

      const guess = state.answerText;
      const answer = String(state.current.answer);
      state.attempts += 1;

      if (guess === answer) {
        const firstTry = state.attempts === 1;
        const hintCost = state.hintOpen ? 2 : 0;
        const basePoints = firstTry ? 10 + Math.min(state.streak, 5) : 6;
        const points = Math.max(4, basePoints - hintCost);

        state.score += points;
        state.correct += 1;
        state.streak = firstTry ? state.streak + 1 : 1;
        state.locked = true;
        state.mascotCheering = true;
        recordProblemResult(true);
        state.message = firstTry ? `잘했어! 한 번에 맞았어. ${points}점!` : `잘했어! 끝까지 생각해서 맞혔어. ${points}점!`;
        state.messageType = "good";
        playTone("good");
        scheduleAutoAdvance();
      } else if (state.attempts < 2) {
        const numericGuess = Number(guess);
        const numericAnswer = Number(answer);
        const canCompare = Number.isFinite(numericGuess) && Number.isFinite(numericAnswer);
        state.streak = 0;
        state.answerText = "";
        state.message = canCompare
          ? numericGuess < numericAnswer ? "조금 더 큰 수야. 한 번 더!" : "조금 더 작은 수야. 한 번 더!"
          : "다른 보기를 골라봐. 한 번 더!";
        state.messageType = "bad";
        playTone("bad");
      } else {
        state.streak = 0;
        state.locked = true;
        recordProblemResult(false);
        state.message = `정답은 ${state.current.answer}. 다음 문제에서 다시 해보자.`;
        state.messageType = "bad";
        playTone("bad");
      }

      render();
    }

    function nextQuestion() {
      if (state.finished) return;
      if (!state.locked) {
        state.message = "입력을 먼저 눌러줘.";
        state.messageType = "bad";
        render();
        return;
      }

      clearAutoAdvance();

      if (state.questionNumber >= TOTAL_QUESTIONS) {
        finishGame();
        return;
      }

      state.questionNumber += 1;
      makeQuestion();
    }

    function finishGame() {
      state.finished = true;
      state.locked = true;
      const oldBest = state.best;

      if (state.score > state.best) {
        state.best = state.score;
        saveSettings();
      }

      const starCount = getStarCount();
      const resultLine = state.score > oldBest
        ? `새 최고기록 ${state.score}점. ${state.correct}문제를 맞혔어요.`
        : `${state.score}점. ${state.correct}문제를 맞혔어요.`;

      els.resultTitle.textContent = starCount === 3 ? "오늘 정말 반짝였어" : "오늘 연습 끝";
      els.resultText.textContent = resultLine;
      els.resultStars.textContent = "★".repeat(starCount) + "☆".repeat(3 - starCount);
      els.resultPanel.hidden = false;
      render();
      els.resultPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function openHint() {
      if (state.finished || !state.current) return;
      state.hintOpen = true;
      state.message = "힌트를 보고 다시 생각해 봐.";
      state.messageType = "";
      render();
    }

    function createDominoHalf(count, isBlank = false) {
      const half = document.createElement("div");
      half.className = isBlank ? "domino-half is-blank" : "domino-half";
      const dots = new Set(DOT_LAYOUTS[count] || []);

      for (let i = 0; i < 9; i += 1) {
        const cell = document.createElement("span");
        cell.className = "domino-cell";
        if (!isBlank && dots.has(i)) {
          const dot = document.createElement("span");
          dot.className = "domino-dot";
          cell.append(dot);
        }
        half.append(cell);
      }

      return half;
    }

    function createDominoSummary(visual) {
      const summary = document.createElement("div");
      summary.className = "domino-summary";

      ["합", "차"].forEach((label) => {
        const head = document.createElement("span");
        head.className = "domino-summary-head";
        head.textContent = label;
        summary.append(head);
      });

      ["합", "차"].forEach((label) => {
        const value = document.createElement("span");
        const isTarget = label === visual.targetKind;
        value.className = isTarget ? "domino-summary-value is-target" : "domino-summary-value";
        value.textContent = isTarget ? BLANK_SYMBOL : String(visual.givenValue);
        summary.append(value);
      });

      return summary;
    }

    function createDominoQuestion(visual) {
      const wrapper = document.createElement("div");
      wrapper.className = "domino-question";

      const domino = document.createElement("div");
      domino.className = "domino-card";
      domino.setAttribute("aria-label", `보이는 점 ${visual.visible}개, 흰 빈칸`);
      domino.append(createDominoHalf(visual.visible), createDominoHalf(0, true));

      const prompt = document.createElement("div");
      prompt.className = "domino-prompt";
      prompt.textContent = `빈칸의 ${visual.targetKind}를 골라요`;

      wrapper.append(domino, createDominoSummary(visual), prompt);
      return wrapper;
    }

    function createCountBoard(total, allowDrawing = false) {
      const board = document.createElement("div");
      board.className = "count-board";
      board.setAttribute("aria-label", `${total}개 점, 10개씩 묶음 점판`);

      const frameCount = Math.ceil(total / 10);
      for (let frameIndex = 0; frameIndex < frameCount; frameIndex += 1) {
        const dotsInFrame = Math.min(10, total - frameIndex * 10);
        const frame = document.createElement("div");
        frame.className = "count-frame";
        frame.setAttribute("aria-label", `${frameIndex + 1}번째 묶음, 점 ${dotsInFrame}개`);

        for (let slotIndex = 0; slotIndex < 10; slotIndex += 1) {
          const slot = document.createElement("span");
          slot.className = "count-slot";

          if (slotIndex < dotsInFrame) {
            const dot = document.createElement("span");
            dot.className = "count-dot";
            slot.append(dot);
          }

          frame.append(slot);
        }

        board.append(frame);
      }

      if (allowDrawing) return createDrawableCountBoard(board);
      return board;
    }

    function createDrawableCountBoard(board) {
      const svgNamespace = "http://www.w3.org/2000/svg";
      const wrapper = document.createElement("div");
      const area = document.createElement("div");
      const layer = document.createElementNS(svgNamespace, "svg");
      const clearButton = document.createElement("button");
      let activePath = null;
      let activePoints = [];

      wrapper.className = "draw-wrap";
      area.className = "draw-area";
      layer.classList.add("draw-layer");
      layer.setAttribute("aria-hidden", "true");
      clearButton.type = "button";
      clearButton.className = "draw-clear";
      clearButton.textContent = "지우기";
      clearButton.setAttribute("aria-label", "그린 묶음 지우기");

      function getPoint(event) {
        const rect = layer.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, event.clientX - rect.left));
        const y = Math.max(0, Math.min(rect.height, event.clientY - rect.top));
        return { x, y };
      }

      function updatePath() {
        const pathText = activePoints
          .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`)
          .join(" ");
        activePath.setAttribute("d", pathText);
      }

      layer.addEventListener("pointerdown", (event) => {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        activePath = document.createElementNS(svgNamespace, "path");
        activePath.classList.add("draw-path");
        activePoints = [getPoint(event)];
        updatePath();
        layer.append(activePath);
        layer.setPointerCapture?.(event.pointerId);
      });

      layer.addEventListener("pointermove", (event) => {
        if (!activePath) return;
        event.preventDefault();
        activePoints.push(getPoint(event));
        updatePath();
      });

      function finishDrawing(event) {
        if (!activePath) return;
        event.preventDefault();
        if (activePoints.length === 1) {
          activePoints.push({ x: activePoints[0].x + 0.1, y: activePoints[0].y + 0.1 });
          updatePath();
        }
        layer.releasePointerCapture?.(event.pointerId);
        activePath = null;
        activePoints = [];
      }

      layer.addEventListener("pointerup", finishDrawing);
      layer.addEventListener("pointercancel", finishDrawing);
      layer.addEventListener("lostpointercapture", () => {
        activePath = null;
        activePoints = [];
      });

      clearButton.addEventListener("click", () => {
        layer.replaceChildren();
      });

      area.append(board, layer);
      wrapper.append(area, clearButton);
      return wrapper;
    }

    function createCountExpression(text) {
      const expression = document.createElement("div");
      expression.className = "count-expression";
      expression.textContent = text;
      return expression;
    }

    function createBundleSummary(visual) {
      const summary = document.createElement("div");
      summary.className = "bundle-summary";

      [
        { key: "tens", label: "10개씩 묶음", value: visual.tens },
        { key: "ones", label: "낱개", value: visual.ones }
      ].forEach((item) => {
        const head = document.createElement("span");
        head.className = "bundle-summary-head";
        head.textContent = item.label;
        summary.append(head);
      });

      [
        { key: "tens", value: visual.tens },
        { key: "ones", value: visual.ones }
      ].forEach((item) => {
        const value = document.createElement("span");
        const isTarget = item.key === visual.target;
        value.className = isTarget ? "bundle-summary-value is-target" : "bundle-summary-value";
        value.textContent = isTarget ? BLANK_SYMBOL : String(item.value);
        summary.append(value);
      });

      return summary;
    }

    function createCountMatchQuestion(visual) {
      const wrapper = document.createElement("div");
      wrapper.className = "count-question";

      if (visual.target === "expression") {
        wrapper.append(createCountBoard(visual.total, true));
      } else {
        wrapper.append(createCountExpression(visual.expression));
      }

      const prompt = document.createElement("div");
      prompt.className = "domino-prompt";
      prompt.textContent = visual.target === "expression" ? "그림과 이어질 식을 골라요" : "식과 이어질 수를 골라요";
      wrapper.append(prompt);
      return wrapper;
    }

    function createBundleQuestion(visual) {
      const wrapper = document.createElement("div");
      wrapper.className = "count-question";
      wrapper.append(createCountBoard(visual.total, true), createBundleSummary(visual));

      const prompt = document.createElement("div");
      prompt.className = "domino-prompt";
      prompt.textContent = visual.target === "tens" ? "10개씩 묶음은?" : "낱개는?";
      wrapper.append(prompt);
      return wrapper;
    }

    function renderQuestion() {
      els.questionText.replaceChildren();
      els.questionText.className = "question";
      if (!state.current) return;

      if (state.current.visual?.type === "domino") {
        els.questionText.classList.add("visual-question");
        els.questionText.append(createDominoQuestion(state.current.visual));
        return;
      }

      if (state.current.visual?.type === "countMatch") {
        els.questionText.classList.add("visual-question");
        els.questionText.append(createCountMatchQuestion(state.current.visual));
        return;
      }

      if (state.current.visual?.type === "bundle") {
        els.questionText.classList.add("visual-question");
        els.questionText.append(createBundleQuestion(state.current.visual));
        return;
      }

      els.questionText.textContent = state.current.text;
      els.questionText.classList.toggle("word-problem", state.current.isWord);
    }

    function renderHint() {
      els.counterRow.replaceChildren();
      if (!state.hintOpen || !state.current) {
        els.hintArea.hidden = true;
        return;
      }

      els.hintArea.hidden = false;
      els.hintTitle.textContent = state.current.hint.title;

      state.current.hint.tokens.forEach((token) => {
        const item = document.createElement("span");
        item.className = token === BLANK_SYMBOL || token === "?" ? "hint-token answer" : "hint-token";
        item.textContent = token;
        els.counterRow.append(item);
      });
    }

    function renderChoices() {
      els.choicePanel.replaceChildren();
      if (!state.current) return;

      state.current.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        const selected = String(choice) === state.answerText;
        button.type = "button";
        button.className = "choice-button";
        if (String(choice).length > 2) button.classList.add("text-choice");
        button.dataset.choice = String(choice);
        button.textContent = choice;
        button.setAttribute("aria-label", `${index + 1}번 보기 ${choice}`);
        button.setAttribute("aria-pressed", String(selected));
        button.disabled = state.locked || state.finished;

        if (state.locked && choice === state.current.answer) {
          button.classList.add("is-correct");
        } else if (state.locked && selected && choice !== state.current.answer) {
          button.classList.add("is-wrong");
        }

        button.addEventListener("click", () => selectChoice(choice));
        els.choicePanel.append(button);
      });
    }

    function render() {
      const mode = MODES[state.mode];
      const level = LEVELS[state.level];
      const completed = state.finished ? TOTAL_QUESTIONS : state.questionNumber - (state.locked ? 0 : 1);
      const progress = Math.max(0, Math.min(100, (completed / TOTAL_QUESTIONS) * 100));

      els.bestPill.textContent = `최고 ${state.best}점`;
      els.roundInfo.textContent = `${Math.min(state.questionNumber, TOTAL_QUESTIONS)} / ${TOTAL_QUESTIONS}`;
      els.modeInfo.textContent = `${mode.label} · ${level.label}`;
      els.progressBar.style.width = `${progress}%`;
      els.streakInfo.textContent = `연속 정답 ${state.streak}`;
      els.attemptBadge.textContent = state.locked ? "풀이 완료" : state.attempts === 0 ? "첫 번째 도전" : "두 번째 도전";

      renderQuestion();

      els.answerLabel.textContent = state.answerText ? `고른 답 ${state.answerText}` : "답을 골라요";
      els.answerDisplay.classList.toggle("has-value", Boolean(state.answerText));
      els.mascotStage.hidden = false;
      els.mascotStage.classList.toggle("is-cheering", state.mascotCheering);
      els.mascotStage.classList.toggle("is-ready", !state.mascotCheering);
      els.mascotStage.setAttribute("aria-hidden", "false");
      els.mascotSpeech.textContent = state.mascotCheering ? "잘했어!" : "같이 풀자!";
      els.message.textContent = state.message;
      els.message.className = `message ${state.messageType}`.trim();
      els.scoreInfo.textContent = state.score;
      els.correctInfo.textContent = state.correct;
      els.starInfo.textContent = getStarCount();
      els.submitButton.disabled = !state.answerText || state.locked || state.finished;
      els.nextButton.disabled = !state.locked || state.finished;
      els.hintButton.disabled = state.finished;
      els.settingsToggle.setAttribute("aria-expanded", String(state.settingsOpen));
      els.settingsPanel.hidden = !state.settingsOpen;
      els.settingsBackdrop.hidden = !state.settingsOpen;

      els.modeButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === state.mode));
      });
      els.levelButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.level === state.level));
      });
      renderChoices();
      renderHint();
      renderDailyMission();
    }

    function setSettingsOpen(open) {
      state.settingsOpen = open;
      render();
    }

    function setMissionProgress(infoEl, fillEl, value, target) {
      const capped = Math.min(value, target);
      infoEl.textContent = `${capped} / ${target}`;
      fillEl.style.width = `${Math.round((capped / target) * 100)}%`;
    }

    function renderDailyMission() {
      const record = ensureTodayRecord();
      els.missionDate.textContent = formatDateLabel(state.todayKey);
      setMissionProgress(els.solvedMissionInfo, els.solvedMissionFill, record.solved, DAILY_MISSIONS.solved);
      setMissionProgress(els.correctMissionInfo, els.correctMissionFill, record.correct, DAILY_MISSIONS.correct);
      setMissionProgress(els.stickerMissionInfo, els.stickerMissionFill, record.stickers, DAILY_MISSIONS.stickers);

      els.stickerBoard.replaceChildren();
      for (let i = 0; i < STICKER_BOARD_SIZE; i += 1) {
        const sticker = document.createElement("span");
        sticker.className = i < record.stickers ? "sticker earned" : "sticker";
        sticker.textContent = i < record.stickers ? "★" : "☆";
        els.stickerBoard.append(sticker);
      }
    }

    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => resetGame(button.dataset.mode, state.level));
    });

    els.levelButtons.forEach((button) => {
      button.addEventListener("click", () => {
        resetGame(state.mode, button.dataset.level);
        setSettingsOpen(false);
      });
    });

    els.settingsToggle.addEventListener("click", () => setSettingsOpen(!state.settingsOpen));
    els.settingsBackdrop.addEventListener("click", () => setSettingsOpen(false));
    els.hintButton.addEventListener("click", openHint);
    els.submitButton.addEventListener("click", checkAnswer);
    els.nextButton.addEventListener("click", nextQuestion);
    els.restartButton.addEventListener("click", () => resetGame(state.mode, state.level));

    window.addEventListener("keydown", (event) => {
      if (event.key >= "1" && event.key <= "4" && !state.locked) {
        const choice = state.current?.choices[Number(event.key) - 1];
        if (choice !== undefined) selectChoice(choice);
      }

      if (event.key === "Enter") {
        if (state.locked) {
          nextQuestion();
        } else {
          checkAnswer();
        }
      }

      if (event.key === "Escape" && state.settingsOpen) {
        setSettingsOpen(false);
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          // Service workers are unavailable when opened directly from the file system.
        });
      });
    }

    const storedState = readStoredState();
    state.best = Number(storedState.best) || 0;
    if (MODES[storedState.mode]) state.mode = storedState.mode;
    if (LEVELS[storedState.level]) state.level = storedState.level;
    state.daily = storedState.daily && typeof storedState.daily === "object" ? storedState.daily : {};
    ensureTodayRecord();
    resetGame(state.mode, state.level);
  </script>
</body>
</html>
